name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agents/tunnel/go.mod
      - name: Build
        working-directory: agents/tunnel
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o tunnel ./cmd/tunnel
          tar -czf "tunnel-${GOOS}-${GOARCH}.tar.gz" tunnel
      - uses: softprops/action-gh-release@v2
        with:
          files: agents/tunnel/tunnel-*.tar.gz

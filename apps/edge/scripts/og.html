<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, initial-scale=1" />
    <style>
      @font-face {
        font-family: "Geist Mono";
        src: url("https://cdn.jsdelivr.net/fontsource/fonts/geist-mono:vf@latest/latin-wght-normal.woff2")
          format("woff2-variations");
        font-weight: 100 900;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        padding: 0 80px;
        color: oklch(94% 0.004 84.58);
        background-color: oklch(21.5% 0.009 33.41);
        background-image:
          repeating-linear-gradient(
            to right,
            oklch(100% 0 0 / 0.07) 0,
            oklch(100% 0 0 / 0.07) 1px,
            transparent 1px,
            transparent 44px
          ),
          repeating-linear-gradient(
            to bottom,
            oklch(100% 0 0 / 0.07) 0,
            oklch(100% 0 0 / 0.07) 1px,
            transparent 1px,
            transparent 44px
          );
        font-family: "Geist Mono", ui-monospace, monospace;
      }

      main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }

      .copy {
        flex: 1;
        min-width: 0;
      }

      .wordmark {
        margin: 0 0 48px;
        font-size: 64px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -4px;
        white-space: nowrap;
      }

      .domain {
        color: oklch(80% 0.1 150);
      }

      .tagline {
        margin: 0 0 18px;
        font-size: 30px;
        font-weight: 500;
        line-height: 1.25;
        white-space: nowrap;
      }

      .subline {
        margin: 0;
        color: oklch(72% 0.007 70.08);
        font-size: 20px;
        font-weight: 400;
        line-height: 1.4;
      }

      svg {
        display: block;
        width: 460px;
        height: 460px;
        flex: 0 0 460px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="copy">
        <h1 class="wordmark">makarima<span class="domain">.xyz</span></h1>
        <p class="tagline">Your localhost, on the internet.</p>
        <p class="subline">tunnels for local development</p>
      </section>

      <svg viewBox="0 0 320 332" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

            <ellipse cx="160" cy="166" rx="40" ry="140" />
          </g>
          <g stroke="oklch(94% .004 84.58 / .34)">
            <path d="M62 96 Q112 66 160 52" />

          </g>
        </g>
      </svg>
    </main>
  </body>
</html>
